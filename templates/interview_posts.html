{% extends 'base.html' %}

{% block content %}

<h2>Interview Experiences</h2>

<p class="text-muted">
    Share your interview experiences with other students.
</p>

<div class="card p-4">

    <form method="POST">
    

        <label>Company Name</label>

        <input type="text"
               name="company"
               class="form-control mb-3">

        <label>Role</label>

        <input type="text"
               name="role"
               class="form-control mb-3">

        <label>Experience</label>

        <textarea name="experience"
                  class="form-control mb-3"
                  rows="5"></textarea>

        <button class="btn btn-primary">
            Post Experience
        </button>

    </form>
    <div class="mt-5">

    <h3>Recent Interview Experiences</h3>

    <hr>

    {% for post in posts %}

    <div class="card p-3 mb-3">

        <h4>{{ post.company_name }}</h4>

        <p>
            <strong>Role:</strong>
            {{ post.role }}
        </p>

        <p>
            {{ post.experience }}
        </p>

    </div>

    {% endfor %}

</div>

</div>

{% endblock %}
