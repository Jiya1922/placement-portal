{% extends 'base.html' %}

{% block content %}

<h2>Profile</h2>

<p class="text-muted">
    Manage your account details.
</p>

<div class="card p-4 mt-4">

    <h4>User Information</h4>

    <hr>

    <p>
        <strong>Name:</strong>
        {{ user.name }}
    </p>

    <p>
        <strong>Email:</strong>
        {{ user.email }}
    </p>

    <p>
        <strong>Department:</strong>
        {{ user.department }}
    </p>

</div>

{% endblock %}
