{% extends 'base.html' %}

{% block content %}

<h2>Coding Practice</h2>

<p class="text-muted">
    Practice coding interview questions.
</p>

<div class="row mt-4">

    {% for q in questions %}

    <div class="col-md-6">

        <div class="card p-3 mb-4">

            <h4>{{ q.title }}</h4>

            <p>
                Difficulty:
                <strong>{{ q.difficulty }}</strong>
            </p>

            <button class="btn btn-dark">
                Solve Problem
            </button>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
